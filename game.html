<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Врата Миров · Игра</title>
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400;1,600&family=Cinzel:wght@400;600&family=Raleway:wght@300;400;600&family=Special+Elite&family=Orbitron:wght@400;600&family=Caveat:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0b0b12;--bg-mid:#13131e;--bg-card:rgba(20,20,35,0.9);
  --accent:#6060b0;--accent2:#8080cc;--accent-glow:#a0a0ee;
  --text:#dcdcf0;--text-dim:#8888aa;--border:rgba(90,90,170,0.25);
  --glow1:rgba(70,70,150,0.18);--glow2:rgba(40,40,100,0.13);--glow3:rgba(50,50,120,0.10);
  --font-title:'Cinzel',serif;--font-body:'Raleway',sans-serif;
  --hp-color:#e05555;--mp-color:#5599ee;--xp-color:#55bb55;
}
body.theme-morrowind{--bg:#1a1410;--bg-mid:#221c15;--bg-card:rgba(40,30,18,0.92);--accent:#c4622a;--accent2:#d4923a;--accent-glow:#f0b84a;--text:#e8d5b0;--text-dim:#c4a97a;--border:rgba(196,98,42,0.28);--glow1:rgba(196,98,42,0.20);--glow2:rgba(74,48,96,0.14);--glow3:rgba(122,32,32,0.10);--font-title:'Uncial Antiqua',serif;--font-body:'Crimson Pro',serif;}
body.theme-lotr{--bg:#0c1208;--bg-mid:#121a0d;--bg-card:rgba(15,24,10,0.92);--accent:#6a9a3a;--accent2:#8abf52;--accent-glow:#aada70;--text:#e8f0d8;--text-dim:#a8c080;--border:rgba(100,160,50,0.28);--glow1:rgba(80,140,40,0.18);--glow2:rgba(40,80,20,0.12);--glow3:rgba(60,100,30,0.09);--font-title:'IM Fell English',serif;--font-body:'Crimson Pro',serif;}
body.theme-hp{--bg:#09071a;--bg-mid:#0f0d22;--bg-card:rgba(16,12,36,0.93);--accent:#8b5cf6;--accent2:#a78bfa;--accent-glow:#c4b5fd;--text:#ede9fe;--text-dim:#a78bfa;--border:rgba(139,92,246,0.28);--glow1:rgba(139,92,246,0.20);--glow2:rgba(88,28,220,0.14);--glow3:rgba(60,20,160,0.10);--font-title:'Cinzel',serif;--font-body:'Raleway',sans-serif;}
body.theme-witcher{--bg:#0f0c08;--bg-mid:#181410;--bg-card:rgba(24,18,10,0.93);--accent:#c8a94a;--accent2:#e0c870;--accent-glow:#f0d880;--text:#e8e0c8;--text-dim:#b8a880;--border:rgba(200,169,74,0.28);--glow1:rgba(180,140,40,0.18);--glow2:rgba(100,80,20,0.12);--glow3:rgba(60,40,10,0.10);--font-title:'IM Fell English',serif;--font-body:'Crimson Pro',serif;}
body.theme-starwars{--bg:#02040a;--bg-mid:#050810;--bg-card:rgba(4,8,20,0.95);--accent:#00aaff;--accent2:#40c8ff;--accent-glow:#80e0ff;--text:#d0eeff;--text-dim:#6090b0;--border:rgba(0,150,255,0.25);--glow1:rgba(0,120,255,0.16);--glow2:rgba(0,60,160,0.12);--glow3:rgba(0,30,100,0.09);--font-title:'Orbitron',sans-serif;--font-body:'Raleway',sans-serif;}
body.theme-lego{--bg:#1a0a00;--bg-mid:#221000;--bg-card:rgba(36,16,0,0.93);--accent:#f7c200;--accent2:#ff6600;--accent-glow:#ffdd44;--text:#fff8e0;--text-dim:#d4a840;--border:rgba(247,194,0,0.32);--glow1:rgba(255,180,0,0.20);--glow2:rgba(255,100,0,0.14);--glow3:rgba(200,80,0,0.10);--font-title:'Special Elite',cursive;--font-body:'Raleway',sans-serif;}
body.theme-alice{--bg:#07041a;--bg-mid:#0c0820;--bg-card:rgba(16,8,32,0.94);--accent:#e040fb;--accent2:#ea80fc;--accent-glow:#f3b8ff;--text:#fce4ff;--text-dim:#c880e0;--border:rgba(220,60,250,0.28);--glow1:rgba(200,40,240,0.18);--glow2:rgba(100,0,160,0.14);--glow3:rgba(60,0,120,0.10);--font-title:'Caveat',cursive;--font-body:'Raleway',sans-serif;}
body.theme-stardew{--bg:#0a1608;--bg-mid:#101e0e;--bg-card:rgba(12,22,10,0.94);--accent:#7bc67e;--accent2:#a5d6a7;--accent-glow:#c8e6c9;--text:#e8f5e9;--text-dim:#81c784;--border:rgba(100,200,100,0.28);--glow1:rgba(80,180,80,0.18);--glow2:rgba(40,120,40,0.12);--glow3:rgba(20,80,20,0.10);--font-title:'Caveat',cursive;--font-body:'Raleway',sans-serif;}

*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;font-family:var(--font-body),Georgia,serif;color:var(--text);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 120% 55% at 50% 105%,var(--glow1) 0%,transparent 65%),radial-gradient(ellipse 70% 40% at 85% 5%,var(--glow2) 0%,transparent 60%),radial-gradient(ellipse 55% 45% at 8% 35%,var(--glow3) 0%,transparent 55%);pointer-events:none;z-index:0;}

/* ── ШАПКА ── */
#player-bar{position:relative;z-index:10;width:100%;max-width:1400px;display:flex;align-items:center;justify-content:space-between;padding:10px 16px 0;gap:12px;opacity:0;transition:opacity 0.5s;}
#player-bar.visible{opacity:1;}
.player-name{color:var(--text-dim);font-size:14px;font-style:italic;opacity:0.75;}
.player-name span{color:var(--accent2);font-style:normal;}
.bar-btns{display:flex;gap:8px;flex-shrink:0;}
.bar-btn{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text-dim);font-size:13px;padding:5px 12px;cursor:pointer;transition:all 0.2s;opacity:0.65;}
.bar-btn:hover{border-color:var(--accent);color:var(--text);opacity:1;}

/* ── ТРЁХКОЛОНОЧНЫЙ LAYOUT ── */
.game-layout{position:relative;z-index:1;width:100%;max-width:1400px;display:grid;grid-template-columns:260px 1fr 260px;gap:16px;padding:12px 16px 28px;min-height:calc(100vh - 50px);}

/* ── БОКОВЫЕ ПАНЕЛИ ── */
.side-panel{display:flex;flex-direction:column;gap:10px;align-self:start;position:sticky;top:16px;}
.panel-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;overflow:visible;}
.panel-header{padding:10px 14px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.panel-header-icon{font-size:14px;}
.panel-header-title{font-family:var(--font-title);font-size:12px;color:var(--accent2);letter-spacing:0.05em;text-transform:uppercase;}
.panel-body{padding:12px 14px;}

/* ── ПЕРСОНАЖ: ПОЛОСКИ HP/MP ── */
.stat-bar-row{margin-bottom:10px;}
.stat-bar-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.stat-bar-name{font-size:11px;color:var(--text-dim);letter-spacing:0.05em;text-transform:uppercase;}
.stat-bar-val{font-size:12px;font-weight:600;color:var(--text);}
.stat-bar-track{height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden;}
.stat-bar-fill{height:100%;border-radius:4px;transition:width 0.5s ease;}
.stat-bar-fill.hp{background:linear-gradient(90deg,#a03030,var(--hp-color));}
.stat-bar-fill.mp{background:linear-gradient(90deg,#2040a0,var(--mp-color));}
.stat-bar-fill.xp{background:linear-gradient(90deg,#207020,var(--xp-color));}

/* ── ПЕРСОНАЖ: ХАРАКТЕРИСТИКИ ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.stat-item{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:7px;padding:8px 10px;text-align:center;}
.stat-item-val{font-size:18px;font-weight:700;color:var(--accent-glow);line-height:1;}
.stat-item-name{font-size:10px;color:var(--text-dim);margin-top:3px;text-transform:uppercase;letter-spacing:0.04em;}

/* ── ПЕРСОНАЖ: НАВЫКИ ── */
.skills-list{display:flex;flex-direction:column;gap:5px;}
.skill-row{display:flex;align-items:center;gap:8px;}
.skill-name{font-size:12px;color:var(--text-dim);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.skill-dots{display:flex;gap:3px;}
.skill-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid var(--border);}
.skill-dot.filled{background:var(--accent);border-color:var(--accent2);}

/* ── ПОРТРЕТ ГЕРОЯ ── */
.portrait-wrap{position:relative;width:100%;display:flex;flex-direction:column;align-items:center;gap:8px;padding:4px 0 10px;}
.portrait-canvas-wrap{position:relative;width:80px;height:80px;image-rendering:pixelated;}
#portrait-canvas{width:80px;height:80px;image-rendering:pixelated;image-rendering:crisp-edges;border:2px solid var(--accent);border-radius:6px;background:rgba(0,0,0,0.4);}
.portrait-name{font-family:var(--font-title);font-size:13px;color:var(--accent-glow);text-align:center;letter-spacing:0.04em;}
.portrait-class{font-size:11px;color:var(--text-dim);text-align:center;font-style:italic;}
.portrait-level{display:inline-block;background:color-mix(in srgb,var(--accent) 20%,transparent);border:1px solid var(--accent);border-radius:4px;padding:2px 8px;font-size:11px;color:var(--accent2);font-family:var(--font-title);letter-spacing:0.04em;}

/* ── ЧЕЛОВЕЧЕК СО СЛОТАМИ (ПИКСЕЛЬ-АРТ) ── */
.doll-wrap{position:relative;margin:0 auto;width:160px;height:260px;}
#pixel-doll{image-rendering:pixelated;image-rendering:crisp-edges;display:block;margin:0 auto;}
.doll-slot{position:absolute;cursor:pointer;transition:all 0.2s;}
.doll-slot .slot-box{width:36px;height:36px;border:1px solid var(--border);border-radius:6px;background:rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;font-size:18px;transition:all 0.2s;position:relative;}
.doll-slot:hover .slot-box{border-color:var(--accent2);background:rgba(255,255,255,0.08);}
.doll-slot.equipped .slot-box{border-color:var(--accent);box-shadow:0 0 8px color-mix(in srgb,var(--accent) 30%,transparent);}
.doll-slot .slot-label{font-size:9px;color:var(--text-dim);text-align:center;margin-top:2px;line-height:1.2;opacity:0.7;}

/* Tooltip при наведении */
.slot-tooltip{position:fixed;z-index:1000;background:var(--bg-mid);border:1px solid var(--accent);border-radius:8px;padding:8px 10px;min-width:130px;pointer-events:none;opacity:0;transition:opacity 0.15s;white-space:nowrap;display:none;}
.slot-tooltip.visible{opacity:1;display:block;}
.slot-tooltip-name{font-size:12px;color:var(--accent-glow);font-weight:600;margin-bottom:4px;}
.slot-tooltip-stat{font-size:11px;color:var(--text-dim);line-height:1.5;}

/* ── ИНВЕНТАРЬ ── */
.inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
.inv-cell{aspect-ratio:1;border:1px solid var(--border);border-radius:7px;background:rgba(255,255,255,0.03);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;position:relative;font-size:20px;}
.inv-cell:hover{border-color:var(--accent2);background:rgba(255,255,255,0.07);}
.inv-cell.has-item{border-color:color-mix(in srgb,var(--accent) 50%,transparent);}
.inv-cell .item-qty{position:absolute;bottom:3px;right:4px;font-size:9px;color:var(--accent2);font-weight:700;line-height:1;}
.item-tooltip{position:fixed;z-index:1000;background:var(--bg-mid);border:1px solid var(--accent);border-radius:8px;padding:8px 10px;min-width:140px;pointer-events:none;opacity:0;transition:opacity 0.15s;white-space:nowrap;display:none;}
.item-tooltip.visible{opacity:1;display:block;}
.item-tooltip-name{font-size:12px;color:var(--accent-glow);font-weight:600;margin-bottom:3px;}
.item-tooltip-desc{font-size:11px;color:var(--text-dim);line-height:1.5;}

.gold-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:7px;}
.gold-icon{font-size:16px;}
.gold-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.05em;}
.gold-val{font-size:16px;font-weight:700;color:var(--accent-glow);margin-left:auto;}

/* ── ИГРОВОЙ ЛОГ (центр) ── */
.container{display:flex;flex-direction:column;min-height:calc(100vh - 50px);}
header{text-align:center;padding:16px 0 14px;margin-bottom:4px;}
header::after{content:'';display:block;margin:12px auto 0;width:220px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),var(--accent),transparent);}
header h1{font-family:var(--font-title);font-size:clamp(16px,3vw,26px);color:var(--accent-glow);text-shadow:0 0 24px var(--glow1);letter-spacing:0.04em;}
header p{font-size:12px;color:var(--text-dim);margin-top:5px;font-style:italic;opacity:0.7;}
#story-log{flex:1;overflow-y:auto;padding:16px 0;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth;}
#story-log::-webkit-scrollbar{width:3px;}
#story-log::-webkit-scrollbar-thumb{background:color-mix(in srgb,var(--accent) 35%,transparent);border-radius:2px;}
.message{animation:rise 0.4s ease both;}
@keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.dm-block{background:linear-gradient(160deg,var(--bg-card) 0%,rgba(0,0,0,0.25) 100%);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:2px 10px 10px 2px;padding:16px 18px;position:relative;}
.dm-block::before{content:'✦';position:absolute;top:-10px;left:12px;font-size:12px;background:var(--bg-mid);padding:0 6px;color:var(--accent);}
.dm-text{color:var(--text);font-size:17px;line-height:1.8;white-space:pre-wrap;}
.player-block{align-self:flex-end;max-width:80%;background:color-mix(in srgb,var(--accent) 8%,transparent);border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);border-right:3px solid var(--accent2);border-radius:10px 2px 2px 10px;padding:11px 15px;}
.player-text{color:color-mix(in srgb,var(--text) 80%,transparent);font-size:15px;line-height:1.6;font-style:italic;}
.dice-result{background:color-mix(in srgb,var(--accent) 12%,transparent);border:1px solid color-mix(in srgb,var(--accent) 50%,transparent);border-radius:10px;padding:14px 18px;text-align:center;color:var(--accent-glow);font-family:var(--font-title);font-size:15px;}
.dice-result .roll-number{font-size:44px;display:block;margin:6px 0 3px;text-shadow:0 0 18px var(--accent-glow);}
#action-zone{padding-top:12px;border-top:1px solid color-mix(in srgb,var(--accent) 20%,transparent);display:flex;flex-direction:column;gap:8px;}
.btn-group{display:flex;flex-direction:column;gap:8px;}
.action-btn{background:linear-gradient(135deg,var(--bg-card),rgba(0,0,0,0.2));border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--font-body);font-size:16px;padding:12px 18px;cursor:pointer;text-align:left;transition:all 0.22s;line-height:1.5;}
.action-btn:hover{background:color-mix(in srgb,var(--accent) 15%,transparent);border-color:var(--accent2);color:var(--accent-glow);transform:translateX(4px);}
.dice-btn{background:color-mix(in srgb,var(--accent) 18%,transparent);border:1px solid color-mix(in srgb,var(--accent) 50%,transparent);border-radius:7px;color:var(--accent-glow);font-family:var(--font-title);font-size:14px;padding:14px 18px;cursor:pointer;text-align:center;transition:all 0.22s;letter-spacing:0.04em;}
.dice-btn:hover{box-shadow:0 0 20px color-mix(in srgb,var(--accent) 35%,transparent);transform:scale(1.01);}
.typing-indicator{display:none;padding:12px 16px;color:color-mix(in srgb,var(--accent) 60%,transparent);font-style:italic;font-size:15px;}
.typing-indicator.visible{display:block;}
.dot{display:inline-block;animation:blink 1.3s infinite;}
.dot:nth-child(2){animation-delay:0.3s;}.dot:nth-child(3){animation-delay:0.6s;}
@keyframes blink{0%,80%,100%{opacity:0.15;}40%{opacity:1;}}
#save-indicator{font-size:11px;color:var(--text-dim);opacity:0;transition:opacity 0.4s;font-style:italic;text-align:right;padding:4px 0 0;}
#save-indicator.visible{opacity:0.5;}

/* ── ЗАГРУЗКА ── */
#auth-loading{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:var(--bg);transition:opacity 0.5s;}
#auth-loading.hidden{opacity:0;pointer-events:none;}
.loading-emblem{font-size:52px;animation:breathe 2s ease-in-out infinite;}
@keyframes breathe{0%,100%{filter:drop-shadow(0 0 10px var(--glow1));transform:scale(1);}50%{filter:drop-shadow(0 0 35px var(--accent-glow));transform:scale(1.05);}}

/* ── АДАПТИВ ── */
@media(max-width:1100px){.game-layout{grid-template-columns:220px 1fr 220px;}}
@media(max-width:860px){
  .game-layout{grid-template-columns:1fr;grid-template-rows:auto;}
  .side-panel{position:static;flex-direction:row;flex-wrap:wrap;}
  .panel-card{min-width:200px;flex:1;}
  .doll-wrap{width:120px;height:170px;}
}
</style>
</head>
<body>

<div id="auth-loading"><div class="loading-emblem">🌐</div></div>

<div id="player-bar">
  <div class="player-name" id="player-name-label">Странник</div>
  <div class="bar-btns">
    <button class="bar-btn" onclick="goToMenu()">← Меню</button>
    <button class="bar-btn" id="btn-logout">Выйти</button>
  </div>
</div>

<div class="game-layout">

  <!-- ══ ЛЕВАЯ ПАНЕЛЬ: ПЕРСОНАЖ ══ -->
  <div class="side-panel" id="left-panel">

    <!-- Портрет героя -->
    <div class="panel-card">
      <div class="panel-header">
        <span class="panel-header-icon">👤</span>
        <span class="panel-header-title">Герой</span>
      </div>
      <div class="panel-body" style="padding:10px 12px;">
        <div class="portrait-wrap">
          <canvas id="portrait-canvas" width="32" height="32"></canvas>
          <div class="portrait-name" id="portrait-name">Странник</div>
          <div class="portrait-class" id="portrait-class">Искатель приключений</div>
          <div class="portrait-level" id="portrait-level">Ур. 1</div>
        </div>
      </div>
    </div>

    <!-- HP / MP / XP -->
    <div class="panel-card">
      <div class="panel-header">
        <span class="panel-header-icon">⚔</span>
        <span class="panel-header-title" id="char-panel-title">Персонаж</span>
      </div>
      <div class="panel-body">
        <div class="stat-bar-row">
          <div class="stat-bar-label">
            <span class="stat-bar-name">Здоровье</span>
            <span class="stat-bar-val" id="hp-val">100 / 100</span>
          </div>
          <div class="stat-bar-track"><div class="stat-bar-fill hp" id="hp-bar" style="width:100%"></div></div>
        </div>
        <div class="stat-bar-row">
          <div class="stat-bar-label">
            <span class="stat-bar-name">Мана</span>
            <span class="stat-bar-val" id="mp-val">50 / 50</span>
          </div>
          <div class="stat-bar-track"><div class="stat-bar-fill mp" id="mp-bar" style="width:100%"></div></div>
        </div>
        <div class="stat-bar-row" style="margin-bottom:0">
          <div class="stat-bar-label">
            <span class="stat-bar-name">Опыт</span>
            <span class="stat-bar-val" id="xp-val">0 / 100</span>
          </div>
          <div class="stat-bar-track"><div class="stat-bar-fill xp" id="xp-bar" style="width:0%"></div></div>
        </div>
      </div>
    </div>

    <!-- Характеристики -->
    <div class="panel-card">
      <div class="panel-header">
        <span class="panel-header-icon">✦</span>
        <span class="panel-header-title">Характеристики</span>
      </div>
      <div class="panel-body">
        <div class="stats-grid" id="stats-grid">
          <!-- заполняется JS -->
        </div>
      </div>
    </div>

    <!-- Навыки -->
    <div class="panel-card">
      <div class="panel-header">
        <span class="panel-header-icon">★</span>
        <span class="panel-header-title">Навыки</span>
      </div>
      <div class="panel-body">
        <div class="skills-list" id="skills-list">
          <!-- заполняется JS -->
        </div>
      </div>
    </div>

  </div>

<script type="module">
import { initializeApp }     from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
import firebaseConfig from "./firebase-config.js";

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ══ СОСТОЯНИЕ ПЕРСОНАЖА ══
const charState = {
  hp:{ cur:100, max:100 }, mp:{ cur:50, max:50 }, xp:{ cur:0, max:100 },
  stats:{ Сила:10, Ловкость:10, Интеллект:10, Харизма:10 },
  skills:[
    {name:'Красноречие',level:1},{name:'Скрытность',level:1},
    {name:'Атака',level:1},{name:'Магия',level:1},{name:'Торговля',level:1},
  ],
  equipment:{ helmet:null, armor:null, weapon:null, gloves:null, ring:null, boots:null },
  inventory:[], gold:0,
};

// ══ ИГРОВОЕ СОСТОЯНИЕ ══
const state = {
  history:[], diceNotation:null, diceReason:null,
  waitingForDice:false, currentActions:[], locked:false,
  uid:null, gameId:'session_'+Date.now(),
  worldPrompt:null, thinkingText:'Рассказчик думает',
};

// ══ AUTH ══
let gameInitialized = false; // защита от двойного срабатывания onAuthStateChanged
onAuthStateChanged(auth, user => {
  const loading = document.getElementById('auth-loading');
  if (!user){ window.location.href='index.html'; return; }
  state.uid = user.uid;
  const name = user.displayName||(user.isAnonymous?'Гость':user.email?.split('@')[0]||'Странник');
  document.getElementById('player-name-label').innerHTML = `<span>${name}</span>`;
  document.getElementById('player-bar').classList.add('visible');

  // Если игра уже инициализирована (повторный вызов от Firebase) — ничего не делаем
  if (gameInitialized) return;

  const newGameData  = sessionStorage.getItem('dnd_newgame');
  const continueData = sessionStorage.getItem('dnd_continue');

  // Скрываем загрузку сразу — не ждём askDM
  loading.classList.add('hidden');
  setTimeout(()=>loading.remove(), 500);

  if (newGameData){
    gameInitialized = true;
    sessionStorage.removeItem('dnd_newgame');
    try {
      const d = JSON.parse(newGameData);
      setupWorld(d);
      initCharForWorld(d);
      renderAllPanels();
      askDM(d.startMsg);
    } catch(e) {
      console.error('newgame parse error:', e);
      window.location.href='menu.html';
    }
  } else if (continueData){
    gameInitialized = true;
    sessionStorage.removeItem('dnd_continue');
    try {
      const d = JSON.parse(continueData);
      setupWorld(d);
      state.history = d.history||[];
      state.gameId  = d.gameId||state.gameId;
      if (d.charState) Object.assign(charState, d.charState);
      renderAllPanels();
      restoreHistory(state.history);
    } catch(e) {
      console.error('continue parse error:', e);
      window.location.href='menu.html';
    }
  } else {
    window.location.href='menu.html'; return;
  }
});

function initCharForWorld(d) {
  // Начальный стартовый набор из инвентаря
  if (d.startKit) {
    charState.gold = d.startKit.gold||0;
    charState.inventory = (d.startKit.items||[]).map(name=>({name,icon:'📦',qty:1,desc:''}));
  }
  // Подбираем статы под мир
  const worldId = d.worldTheme||'';
  const statSets = {
    morrowind:{Сила:10,Ловкость:12,Интеллект:10,Удача:8},
    lotr:{Сила:12,Выносливость:10,Мудрость:10,Воля:8},
    hp:{Интеллект:14,Смелость:10,Хитрость:8,Удача:10},
    witcher:{Сила:12,Ловкость:12,Знания:10,Знаки:8},
    starwars:{Сила:10,Ловкость:12,Интеллект:10,Сила_духа:10},
    lego:{Творчество:14,Ловкость:10,Сила:8,Удача:10},
    alice:{Безумие:12,Любопытство:14,Логика:6,Везение:10},
    stardew:{Земледелие:10,Горное_дело:8,Рыбалка:8,Дружба:12},
  };
  if (statSets[worldId]) charState.stats = statSets[worldId];
  const skillSets = {
    morrowind:[{name:'Длинные клинки',level:1},{name:'Скрытность',level:1},{name:'Красноречие',level:1},{name:'Алхимия',level:1},{name:'Торговля',level:1}],
    lotr:[{name:'Владение мечом',level:1},{name:'Стрельба',level:1},{name:'Следопыт',level:1},{name:'Магия',level:1},{name:'Дипломатия',level:1}],
    hp:[{name:'Заклинания',level:1},{name:'Зелья',level:1},{name:'Трансфигурация',level:1},{name:'Полёт',level:1},{name:'Защита',level:1}],
    witcher:[{name:'Мечи',level:1},{name:'Знаки',level:1},{name:'Алхимия',level:1},{name:'Слежка',level:1},{name:'Беглость',level:1}],
    starwars:[{name:'Сила',level:1},{name:'Пилотаж',level:1},{name:'Стрельба',level:1},{name:'Техника',level:1},{name:'Хитрость',level:1}],
    lego:[{name:'Строительство',level:1},{name:'Ловкость',level:1},{name:'Изобретения',level:1},{name:'Командование',level:1},{name:'Удача',level:1}],
    alice:[{name:'Абсурд',level:1},{name:'Бег',level:1},{name:'Чаепитие',level:1},{name:'Загадки',level:1},{name:'Уменьшение',level:1}],
    stardew:[{name:'Земледелие',level:1},{name:'Горное дело',level:1},{name:'Рыбалка',level:1},{name:'Кулинария',level:1},{name:'Дружба',level:1}],
  };
  if (skillSets[worldId]) charState.skills = skillSets[worldId];
}

function setupWorld(d){
  if (d.worldTheme) document.body.classList.add('theme-'+d.worldTheme);
  document.getElementById('game-title').textContent    = d.worldTitle    ||'Врата Миров';
  document.getElementById('game-subtitle').textContent = d.worldSubtitle ||'Твоё приключение';
  document.getElementById('char-panel-title').textContent = d.playerName||'Персонаж';
  if (d.playerName) document.getElementById('portrait-name').textContent = d.playerName;
  if (d.charClass)  document.getElementById('portrait-class').textContent = d.charClass;
  if (d.thinkingText){
    state.thinkingText=d.thinkingText;
    document.getElementById('typing').innerHTML=`${d.thinkingText}<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>`;
  }
  if (d.worldPrompt) state.worldPrompt=d.worldPrompt;
  setTimeout(updatePixelArt, 100);
}

// ══ РЕНДЕР ПАНЕЛЕЙ ══
function renderAllPanels(){
  renderBars(); renderStats(); renderSkills(); renderEquipment(); renderInventory();
}

function renderBars(){
  const {hp,mp,xp}=charState;
  document.getElementById('hp-val').textContent=`${hp.cur} / ${hp.max}`;
  document.getElementById('mp-val').textContent=`${mp.cur} / ${mp.max}`;
  document.getElementById('xp-val').textContent=`${xp.cur} / ${xp.max}`;
  document.getElementById('hp-bar').style.width=`${Math.max(0,Math.min(100,(hp.cur/hp.max)*100))}%`;
  document.getElementById('mp-bar').style.width=`${Math.max(0,Math.min(100,(mp.cur/mp.max)*100))}%`;
  document.getElementById('xp-bar').style.width=`${Math.max(0,Math.min(100,(xp.cur/xp.max)*100))}%`;
}

function renderStats(){
  const grid = document.getElementById('stats-grid');
  grid.innerHTML = Object.entries(charState.stats).map(([name,val])=>
    `<div class="stat-item"><div class="stat-item-val">${val}</div><div class="stat-item-name">${name}</div></div>`
  ).join('');
}

function renderSkills(){
  const list = document.getElementById('skills-list');
  list.innerHTML = charState.skills.map(s=>`
    <div class="skill-row">
      <span class="skill-name">${s.name}</span>
      <div class="skill-dots">${[1,2,3,4,5].map(i=>`<div class="skill-dot ${i<=s.level?'filled':''}"></div>`).join('')}</div>
    </div>`).join('');
}

function renderEquipment(){
  const slots=['helmet','armor','weapon','gloves','ring','boots'];
  const defaultIcons={helmet:'⛑️',armor:'🛡️',weapon:'⚔️',gloves:'🧤',ring:'💍',boots:'👢'};
  slots.forEach(slot=>{
    const item   = charState.equipment[slot];
    const iconEl = document.getElementById(`slot-${slot}-icon`);
    const slotEl = document.getElementById(`slot-${slot}`);
    if (!iconEl || !slotEl) return;
    if (item){
      iconEl.textContent = item.icon||defaultIcons[slot];
      // Храним данные тултипа в data-атрибутах
      slotEl.dataset.tipName = item.name||'Предмет';
      slotEl.dataset.tipStat = item.stat||'';
      slotEl.classList.add('equipped');
    } else {
      iconEl.textContent = defaultIcons[slot];
      slotEl.dataset.tipName = 'Пусто';
      slotEl.dataset.tipStat = '';
      slotEl.classList.remove('equipped');
    }
  });
}

function renderInventory(){
  const grid = document.getElementById('inv-grid');
  const cells = 12;
  let html='';
  for (let i=0;i<cells;i++){
    const item = charState.inventory[i];
    if (item){
      const esc = s => s.replace(/'/g,"&#39;");
      html+=`<div class="inv-cell has-item"
        onmouseenter="showItemTooltip(this,'${esc(item.name)}','${esc(item.desc||'')}')"
        onmouseleave="hideItemTooltip()">
        ${item.icon||'📦'}
        ${item.qty>1?`<span class="item-qty">${item.qty}</span>`:''}
      </div>`;
    } else {
      html+=`<div class="inv-cell"></div>`;
    }
  }
  grid.innerHTML=html;
  document.getElementById('gold-val').textContent=charState.gold;
}

// ══ ОБНОВЛЕНИЕ СОСТОЯНИЯ ИЗ ОТВЕТА ИИ ══
function applyCharUpdate(update){
  if(!update) return;
  let changed=false;

  if(update.hp!==undefined){ charState.hp.cur=Math.max(0,Math.min(charState.hp.max,update.hp)); changed=true; }
  if(update.hp_max!==undefined){ charState.hp.max=update.hp_max; changed=true; }
  if(update.mp!==undefined){ charState.mp.cur=Math.max(0,Math.min(charState.mp.max,update.mp)); changed=true; }
  if(update.mp_max!==undefined){ charState.mp.max=update.mp_max; changed=true; }
  if(update.xp!==undefined){ charState.xp.cur=update.xp; if(charState.xp.cur>=charState.xp.max){charState.xp.cur=0;charState.xp.max=Math.round(charState.xp.max*1.5);levelUp();} changed=true; }
  if(update.gold!==undefined){ charState.gold=update.gold; changed=true; }

  if(update.stats){ Object.assign(charState.stats,update.stats); changed=true; }

  if(update.skills){ update.skills.forEach(us=>{ const s=charState.skills.find(sk=>sk.name===us.name); if(s) s.level=Math.max(1,Math.min(5,us.level)); }); changed=true; }

  if(update.equipment){ Object.entries(update.equipment).forEach(([slot,item])=>{ charState.equipment[slot]=item; }); changed=true; }

  if(update.inventory_add){ update.inventory_add.forEach(item=>{ const ex=charState.inventory.find(i=>i.name===item.name); if(ex) ex.qty=(ex.qty||1)+(item.qty||1); else charState.inventory.push({...item,qty:item.qty||1}); }); changed=true; }

  if(update.inventory_remove){ update.inventory_remove.forEach(name=>{ const idx=charState.inventory.findIndex(i=>i.name===name); if(idx>=0) charState.inventory.splice(idx,1); }); changed=true; }

  if(changed){ renderAllPanels(); updatePixelArt(); }
}

let playerLevel = 1;
function levelUp(){
  playerLevel++;
  Object.keys(charState.stats).forEach(k=>{ charState.stats[k]+=1; });
  charState.hp.max+=10; charState.hp.cur=charState.hp.max;
  charState.mp.max+=5;  charState.mp.cur=charState.mp.max;
  document.getElementById('portrait-level').textContent=`Ур. ${playerLevel}`;
  addDMMessage(`✨ Уровень ${playerLevel}! Характеристики улучшены.`);
  updatePixelArt();
}

// ══ СОХРАНЕНИЕ ══
async function saveProgress(){
  if(!state.uid||state.history.length===0) return;
  try {
    const titleEl=document.getElementById('game-title');
    await setDoc(doc(db,'players',state.uid,'games',state.gameId),{
      gameId:        state.gameId,
      title:         titleEl.textContent+' · '+new Date().toLocaleDateString('ru'),
      history:       state.history,
      charState:     charState,
      worldTheme:    document.body.className.match(/theme-(\S+)/)?.[1]||null,
      worldTitle:    titleEl.textContent,
      worldSubtitle: document.getElementById('game-subtitle').textContent,
      thinkingText:  state.thinkingText,
      savedAt:       serverTimestamp(),
    });
    const el=document.getElementById('save-indicator');
    el.classList.add('visible');
    setTimeout(()=>el.classList.remove('visible'),2500);
  } catch(e){ console.warn('Autosave:',e); }
}

// ══ СИСТЕМНЫЙ ПРОМПТ ══
function buildSystemPrompt(){
  const base=state.worldPrompt||'Ты — рассказчик, ведущий приключение.';
  const statsStr=JSON.stringify(charState.stats);
  const invStr=charState.inventory.map(i=>`${i.name}(${i.qty||1})`).join(', ')||'пусто';
  const equipStr=Object.entries(charState.equipment).filter(([,v])=>v).map(([k,v])=>`${k}:${v.name}`).join(', ')||'пусто';
  return `${base}

ТЕКУЩЕЕ СОСТОЯНИЕ ПЕРСОНАЖА:
HP: ${charState.hp.cur}/${charState.hp.max} | Мана: ${charState.mp.cur}/${charState.mp.max} | Золото: ${charState.gold}
Статы: ${statsStr}
Инвентарь: ${invStr}
Экипировка: ${equipStr}

СТИЛЬ:
- Короткие абзацы 2-3 предложения, пустая строка между абзацами.
- Сразу последствия и ощущения, не пересказывай выбор.
- Второе лицо. Живые диалоги. 1-2 эмодзи уместно.

ДЕЙСТВИЯ: от 1 до 5 вариантов, каждый начинается с эмодзи по смыслу.

МЕХАНИКА: При боях, торговле, получении предметов или урона — обнови характеристики в поле "char_update".

ФОРМАТ — строго валидный JSON без текста снаружи:
{
  "story": "текст с\\nпереносами",
  "type": "choice",
  "actions": ["⚔️ Атаковать", "💬 Поговорить"],
  "char_update": {
    "hp": 85,
    "gold": 120,
    "xp": 15,
    "inventory_add": [{"name":"Меч орка","icon":"⚔️","qty":1,"desc":"Урон +5, ржавый"}],
    "inventory_remove": ["Старый нож"],
    "equipment": {"weapon": {"name":"Меч орка","icon":"⚔️","stat":"Урон: 1d8+2"}},
    "stats": {"Сила": 12},
    "skills": [{"name":"Атака","level":2}]
  }
}
char_update включай только когда что-то реально меняется. Если ничего не меняется — опусти поле.
ТОЛЬКО JSON.`;
}

// ══ ДВИЖОК ══
const log=document.getElementById('story-log');
const actionZone=document.getElementById('action-zone');
const typing=document.getElementById('typing');

function scrollBottom(){ setTimeout(()=>log.scrollTop=log.scrollHeight,60); }
function showTyping(v){ typing.classList.toggle('visible',v); }

function addDMMessage(text){
  const d=document.createElement('div');
  d.className='message dm-block';
  d.innerHTML=`<div class="dm-text">${text}</div>`;
  log.appendChild(d); scrollBottom();
}
function addPlayerMessage(text){
  const d=document.createElement('div');
  d.className='message player-block';
  d.innerHTML=`<div class="player-text">↳ ${text}</div>`;
  log.appendChild(d); scrollBottom();
}
function addDiceResult(notation,result,reason){
  const d=document.createElement('div');
  d.className='message dice-result';
  d.innerHTML=`🎲 ${reason}<br><span class="roll-number">${result}</span><small style="opacity:0.6">${notation}</small>`;
  log.appendChild(d); scrollBottom();
}
function setActionZone(html){ actionZone.innerHTML=html; scrollBottom(); }

function rollDice(notation){
  const m=notation.match(/^(\d+)d(\d+)([+-]\d+)?$/i);
  if(!m) return Math.floor(Math.random()*20)+1;
  const n=+m[1],s=+m[2],mod=m[3]?+m[3]:0;
  let t=0; for(let i=0;i<n;i++) t+=Math.floor(Math.random()*s)+1;
  return t+mod;
}

async function askDM(userMessage){
  if(state.locked) return;
  state.locked=true;
  if(userMessage) state.history.push({role:'user',content:userMessage});
  showTyping(true); setActionZone('');

  try {
    const resp=await fetch('https://dnd-proxy.vercel.app/api/proxy',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:1200,system:buildSystemPrompt(),messages:state.history})
    });
    const data=await resp.json();
    const raw=data.content?.[0]?.text||'{}';
    let parsed;
    try {
      const clean=raw.replace(/```json?\s*/gi,'').replace(/```\s*/g,'').trim();
      parsed=JSON.parse(clean);
    } catch { parsed={story:raw,type:'choice',actions:['Продолжить...']}; }

    state.history.push({role:'assistant',content:raw});
    showTyping(false);
    addDMMessage(parsed.story||'...');
    if(parsed.char_update) applyCharUpdate(parsed.char_update);
    renderActions(parsed);
    saveProgress();
  } catch(err){
    showTyping(false);
    addDMMessage('⚠ Связь прервана. Попробуй ещё раз.');
    setActionZone(`<button class="action-btn" onclick="window._retry()">🔄 Попробовать снова</button>`);
  }
  state.locked=false;
}

function renderActions(parsed){
  const{type,actions,dice}=parsed;
  let html='<div class="btn-group">';
  if(type==='dice'){
    state.waitingForDice=true;
    state.diceNotation=dice?.notation||'1d20';
    state.diceReason=dice?.reason||'Бросок';
    html+=`<button class="dice-btn" onclick="window._roll()">🎲 Бросить кубик — ${state.diceReason} (${state.diceNotation})</button>`;
  } else if(actions?.length){
    state.currentActions=actions;
    actions.forEach((a,i)=>{ html+=`<button class="action-btn" onclick="window._choice(${i})">${a}</button>`; });
  }
  html+='</div>'; setActionZone(html);
}

window._choice=i=>{
  const a=state.currentActions?.[i];
  if(!a||state.locked) return;
  addPlayerMessage(a); askDM(`Я выбираю: ${a}`);
};
window._roll=()=>{
  if(!state.waitingForDice||state.locked) return;
  const n=state.diceNotation,r=state.diceReason,result=rollDice(n);
  state.waitingForDice=false;
  addDiceResult(n,result,r);
  askDM(`Я бросил ${n} для "${r}" и выпало: ${result}`);
};
window._retry=()=>{
  if(state.history.length&&state.history[state.history.length-1].role==='assistant') state.history.pop();
  askDM(null);
};

function restoreHistory(history){
  for(const msg of history){
    if(msg.role==='user'&&!msg.content.startsWith('Начни новое')){
      addPlayerMessage(msg.content.replace('Я выбираю: ',''));
    } else if(msg.role==='assistant'){
      try {
        const p=JSON.parse(msg.content.replace(/```json?\s*/gi,'').replace(/```\s*/g,'').trim());
        if(p.story) addDMMessage(p.story);
      } catch { if(msg.content&&msg.content!=='{}') addDMMessage(msg.content); }
    }
  }
  askDM('Продолжай приключение. Напомни коротко где я нахожусь и что происходит, затем дай варианты.');
}

const PIXEL_SCALE = 1; // canvas 48x72 -> отображается в 96x144 через CSS

// Палитры для каждого мира
const WORLD_PALETTES = {
  morrowind: { skin:'#c8a882', hair:'#3a2010', body:'#8b3d18', legs:'#5a2810', outline:'#1a0a00' },
  lotr:      { skin:'#d4b896', hair:'#6a4a20', body:'#4a6040', legs:'#3a4830', outline:'#151510' },
  hp:        { skin:'#e8c8a0', hair:'#3a2808', body:'#8b2020', legs:'#1a1a50', outline:'#100808' },
  witcher:   { skin:'#d0b090', hair:'#f0f0f0', body:'#1a1a1a', legs:'#1a1a1a', outline:'#080808' },
  starwars:  { skin:'#c8a870', hair:'#181818', body:'#303040', legs:'#202030', outline:'#080810' },
  lego:      { skin:'#f0d020', hair:'#a06010', body:'#e03020', legs:'#2040c0', outline:'#101010' },
  alice:     { skin:'#f0c8d0', hair:'#d0a8d8', body:'#4080c0', legs:'#c02080', outline:'#180818' },
  stardew:   { skin:'#e8c898', hair:'#803010', body:'#608030', legs:'#4a6020', outline:'#181008' },
  default:   { skin:'#c8a882', hair:'#3a2010', body:'#604888', legs:'#403060', outline:'#0e0e14' },
};

// Пиксельный рисунок персонажа (48x72 пикселей)
// Формат: строки пикселей, символы: S=кожа H=волосы B=тело L=ноги .=прозрачный O=контур
const CHAR_SPRITE = [
  '....OOOOO....',
  '...OSHHHSO...',
  '...OSSSSO....',
  '....OOOO.....',
  '..OOBBBBBOO..',
  '..OBBBBBBBOO.',
  '..OBBBBBBBOO.',
  '..OBBBBBBBOO.',
  '..OOBBBBBOO..',
  '..OO.OOO.OO..',
  '..OO.OLL.OO..',
  '..OO.OLL.OO..',
  '..OO.OLL.OO..',
  '..OO.OLL.OO..',
  '....OSSSO....',
];

function drawPixelDoll(worldTheme, equipment) {
  const canvas = document.getElementById('pixel-doll');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const pal = WORLD_PALETTES[worldTheme] || WORLD_PALETTES.default;
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  const colorMap = { S: pal.skin, H: pal.hair, B: pal.body, L: pal.legs, O: pal.outline, '.': null };

  // Если надето оружие — меняем цвет тела
  if (equipment?.weapon) colorMap.B = '#6a4030';
  if (equipment?.armor)  colorMap.B = '#505060';
  if (equipment?.helmet) colorMap.H = '#707080';

  const pw = 3, ph = 3;
  // Центрируем спрайт на canvas 48x72
  const spriteW = CHAR_SPRITE[0].length * pw;
  const spriteH = CHAR_SPRITE.length * ph;
  const offsetX = Math.floor((W - spriteW) / 2);
  const offsetY = Math.floor((H - spriteH) / 2) - 4;

  CHAR_SPRITE.forEach((row, ry) => {
    for (let cx = 0; cx < row.length; cx++) {
      const ch = row[cx];
      const col = colorMap[ch];
      if (!col) continue;
      ctx.fillStyle = col;
      ctx.fillRect(offsetX + cx * pw, offsetY + ry * ph, pw, ph);
    }
  });

  // Меч справа если есть оружие
  if (equipment?.weapon) {
    ctx.fillStyle = '#c8c8d0';
    ctx.fillRect(offsetX + spriteW + 2, offsetY + 20, 3, 16);
    ctx.fillStyle = '#a06020';
    ctx.fillRect(offsetX + spriteW, offsetY + 28, 8, 3);
  }

  // Шлем поверх головы
  if (equipment?.helmet) {
    ctx.fillStyle = '#808090';
    ctx.fillRect(offsetX + 3, offsetY - 3, spriteW - 6, 4);
  }
}

// Портрет (32x32 пикселей)
const PORTRAIT_SPRITES = {
  // Базовые лица по классам
  warrior:  ['........','..OOOO..','..SSSSO.','..SHSSO.','..SSSSO.','..OBBO..','...OO...','........'],
  mage:     ['..HHHH..','..OHSSO.','..SHSSO.','..SSSSO.','..OBBO..','...OO...','........','........'],
  rogue:    ['........','...OOO..','..OSSSO.','..SHSHO.','..SSSSO.','..OBBO..','...OO...','........'],
  default:  ['........','..OOOO..','..SSSSO.','..SHSHO.','..SSSSO.','..OBBO..','...OO...','........'],
};

const PORTRAIT_BG = {
  morrowind:'#2a1a10', lotr:'#101a08', hp:'#180818', witcher:'#101010',
  starwars:'#020410', lego:'#201000', alice:'#100818', stardew:'#081408', default:'#0e0e14',
};

function drawPortrait(worldTheme, charClass) {
  const canvas = document.getElementById('portrait-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const pal = WORLD_PALETTES[worldTheme] || WORLD_PALETTES.default;
  const bg  = PORTRAIT_BG[worldTheme] || PORTRAIT_BG.default;
  ctx.clearRect(0, 0, 32, 32);

  // Фон
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, 32, 32);

  // Декоративная рамка
  ctx.fillStyle = pal.outline;
  ctx.fillRect(0, 0, 32, 1); ctx.fillRect(0, 31, 32, 1);
  ctx.fillRect(0, 0, 1, 32); ctx.fillRect(31, 0, 1, 32);

  // Выбираем спрайт
  const spriteKey = charClass?.toLowerCase().includes('маг')||charClass?.toLowerCase().includes('mag') ? 'mage'
    : charClass?.toLowerCase().includes('разбой')||charClass?.toLowerCase().includes('rogue') ? 'rogue'
    : charClass?.toLowerCase().includes('воин')||charClass?.toLowerCase().includes('war') ? 'warrior'
    : 'default';
  const sprite = PORTRAIT_SPRITES[spriteKey] || PORTRAIT_SPRITES.default;
  const colorMap = { S: pal.skin, H: pal.hair, O: pal.outline, B: pal.body, '.': null };
  const pw = 3, startX = 8, startY = 10;

  sprite.forEach((row, ry) => {
    for (let cx = 0; cx < row.length; cx++) {
      const col = colorMap[row[cx]];
      if (!col) continue;
      ctx.fillStyle = col;
      ctx.fillRect(startX + cx * pw, startY + ry * pw, pw, pw);
    }
  });

  // Орнамент под миром — уголки
  ctx.fillStyle = pal.accent || pal.body;
  [[2,2],[27,2],[2,27],[27,27]].forEach(([x,y])=>{
    ctx.fillRect(x,y,3,1); ctx.fillRect(x,y,1,3);
  });
}

function updatePixelArt() {
  const theme = document.body.className.match(/theme-(\S+)/)?.[1] || 'default';
  drawPortrait(theme, document.getElementById('portrait-class')?.textContent);
  drawPixelDoll(theme, charState.equipment);
}
