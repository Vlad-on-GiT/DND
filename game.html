<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Врата Миров · Игра</title>
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400;1,600&family=Cinzel:wght@400;600&family=Raleway:wght@300;400;600&family=Special+Elite&family=Orbitron:wght@400;600&family=Caveat:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0b0b12;--bg-mid:#13131e;--accent:#6060b0;--accent2:#8080cc;--accent-glow:#a0a0ee;
  --text:#dcdcf0;--text-dim:#8888aa;--card-bg:rgba(25,25,45,0.85);--border:rgba(90,90,170,0.25);
  --glow1:rgba(70,70,150,0.18);--glow2:rgba(40,40,100,0.13);--glow3:rgba(50,50,120,0.10);
  --font-title:'Cinzel',serif;--font-body:'Raleway',sans-serif;
}
body.theme-morrowind{--bg:#1a1410;--bg-mid:#221c15;--accent:#c4622a;--accent2:#d4923a;--accent-glow:#f0b84a;--text:#e8d5b0;--text-dim:#c4a97a;--card-bg:rgba(46,36,25,0.88);--border:rgba(196,98,42,0.3);--glow1:rgba(196,98,42,0.22);--glow2:rgba(74,48,96,0.16);--glow3:rgba(122,32,32,0.12);--font-title:'Uncial Antiqua',serif;--font-body:'Crimson Pro',serif;}
body.theme-lotr{--bg:#0c1208;--bg-mid:#121a0d;--accent:#6a9a3a;--accent2:#8abf52;--accent-glow:#aada70;--text:#e8f0d8;--text-dim:#a8c080;--card-bg:rgba(18,26,10,0.9);--border:rgba(100,160,50,0.3);--glow1:rgba(80,140,40,0.2);--glow2:rgba(40,80,20,0.14);--glow3:rgba(60,100,30,0.10);--font-title:'IM Fell English',serif;--font-body:'Crimson Pro',serif;}
body.theme-hp{--bg:#09071a;--bg-mid:#0f0d22;--accent:#8b5cf6;--accent2:#a78bfa;--accent-glow:#c4b5fd;--text:#ede9fe;--text-dim:#a78bfa;--card-bg:rgba(18,14,40,0.92);--border:rgba(139,92,246,0.32);--glow1:rgba(139,92,246,0.22);--glow2:rgba(88,28,220,0.16);--glow3:rgba(60,20,160,0.12);--font-title:'Cinzel',serif;--font-body:'Raleway',sans-serif;}
body.theme-witcher{--bg:#0f0c08;--bg-mid:#181410;--accent:#c8a94a;--accent2:#e0c870;--accent-glow:#f0d880;--text:#e8e0c8;--text-dim:#b8a880;--card-bg:rgba(28,22,12,0.92);--border:rgba(200,169,74,0.3);--glow1:rgba(180,140,40,0.2);--glow2:rgba(100,80,20,0.14);--glow3:rgba(60,40,10,0.12);--font-title:'IM Fell English',serif;--font-body:'Crimson Pro',serif;}
body.theme-starwars{--bg:#02040a;--bg-mid:#050810;--accent:#00aaff;--accent2:#40c8ff;--accent-glow:#80e0ff;--text:#d0eeff;--text-dim:#6090b0;--card-bg:rgba(4,8,20,0.94);--border:rgba(0,150,255,0.28);--glow1:rgba(0,120,255,0.18);--glow2:rgba(0,60,160,0.14);--glow3:rgba(0,30,100,0.10);--font-title:'Orbitron',sans-serif;--font-body:'Raleway',sans-serif;}
body.theme-lego{--bg:#1a0a00;--bg-mid:#221000;--accent:#f7c200;--accent2:#ff6600;--accent-glow:#ffdd44;--text:#fff8e0;--text-dim:#d4a840;--card-bg:rgba(40,20,0,0.92);--border:rgba(247,194,0,0.38);--glow1:rgba(255,180,0,0.22);--glow2:rgba(255,100,0,0.16);--glow3:rgba(200,80,0,0.12);--font-title:'Special Elite',cursive;--font-body:'Raleway',sans-serif;}
body.theme-alice{--bg:#07041a;--bg-mid:#0c0820;--accent:#e040fb;--accent2:#ea80fc;--accent-glow:#f3b8ff;--text:#fce4ff;--text-dim:#c880e0;--card-bg:rgba(18,8,34,0.94);--border:rgba(220,60,250,0.3);--glow1:rgba(200,40,240,0.2);--glow2:rgba(100,0,160,0.16);--glow3:rgba(60,0,120,0.12);--font-title:'Caveat',cursive;--font-body:'Raleway',sans-serif;}
body.theme-stardew{--bg:#0a1608;--bg-mid:#101e0e;--accent:#7bc67e;--accent2:#a5d6a7;--accent-glow:#c8e6c9;--text:#e8f5e9;--text-dim:#81c784;--card-bg:rgba(12,26,10,0.94);--border:rgba(100,200,100,0.3);--glow1:rgba(80,180,80,0.2);--glow2:rgba(40,120,40,0.14);--glow3:rgba(20,80,20,0.12);--font-title:'Caveat',cursive;--font-body:'Raleway',sans-serif;}

*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;font-family:var(--font-body),Georgia,serif;color:var(--text);overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 120% 55% at 50% 105%,var(--glow1) 0%,transparent 65%),radial-gradient(ellipse 70% 40% at 85% 5%,var(--glow2) 0%,transparent 60%),radial-gradient(ellipse 55% 45% at 8% 35%,var(--glow3) 0%,transparent 55%);pointer-events:none;z-index:0;}

/* ── ШАПКА ── */
#player-bar{position:relative;z-index:10;width:100%;max-width:780px;display:flex;align-items:center;justify-content:space-between;padding:10px 16px 0;gap:12px;opacity:0;transition:opacity 0.5s;}
#player-bar.visible{opacity:1;}
.player-name{color:var(--text-dim);font-size:14px;font-style:italic;opacity:0.75;}
.player-name span{color:var(--accent2);font-style:normal;}
.bar-btns{display:flex;gap:8px;flex-shrink:0;}
.bar-btn{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text-dim);font-family:var(--font-body);font-size:13px;padding:5px 12px;cursor:pointer;transition:all 0.2s;opacity:0.65;white-space:nowrap;}
.bar-btn:hover{border-color:var(--accent);color:var(--text);opacity:1;}

/* ── КОНТЕЙНЕР ── */
.container{position:relative;z-index:1;width:100%;max-width:780px;min-height:100vh;display:flex;flex-direction:column;padding:0 16px 28px;}
header{text-align:center;padding:20px 0 18px;margin-bottom:4px;}
header::after{content:'';display:block;margin:14px auto 0;width:260px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),var(--accent2),var(--accent),transparent);}
header h1{font-family:var(--font-title);font-size:clamp(18px,4vw,30px);color:var(--accent-glow);text-shadow:0 0 28px var(--glow1),0 2px 6px rgba(0,0,0,0.9);letter-spacing:0.04em;}
header p{font-size:13px;color:var(--text-dim);margin-top:7px;font-style:italic;opacity:0.75;}

/* ── ЛОГ ── */
#story-log{flex:1;overflow-y:auto;padding:20px 0;display:flex;flex-direction:column;gap:18px;scroll-behavior:smooth;}
#story-log::-webkit-scrollbar{width:3px;}
#story-log::-webkit-scrollbar-thumb{background:color-mix(in srgb,var(--accent) 40%,transparent);border-radius:2px;}
.message{animation:rise 0.45s ease both;}
@keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.dm-block{background:linear-gradient(160deg,var(--card-bg) 0%,rgba(0,0,0,0.3) 100%);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:2px 10px 10px 2px;padding:18px 22px;position:relative;}
.dm-block::before{content:'✦';position:absolute;top:-11px;left:14px;font-size:13px;background:var(--bg-mid);padding:0 7px;color:var(--accent);}
.dm-text{color:var(--text);font-size:18px;line-height:1.8;white-space:pre-wrap;}
.player-block{align-self:flex-end;max-width:78%;background:color-mix(in srgb,var(--accent) 10%,transparent);border:1px solid color-mix(in srgb,var(--accent) 35%,transparent);border-right:3px solid var(--accent2);border-radius:10px 2px 2px 10px;padding:13px 17px;}
.player-text{color:color-mix(in srgb,var(--text) 80%,transparent);font-size:16px;line-height:1.6;font-style:italic;}
.dice-result{background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 16%,transparent),color-mix(in srgb,var(--accent) 8%,transparent));border:1px solid color-mix(in srgb,var(--accent) 55%,transparent);border-radius:10px;padding:16px 22px;text-align:center;color:var(--accent-glow);font-family:var(--font-title);font-size:16px;}
.dice-result .roll-number{font-size:48px;display:block;margin:8px 0 4px;text-shadow:0 0 20px var(--accent-glow);}

/* ── ДЕЙСТВИЯ ── */
#action-zone{padding-top:14px;border-top:1px solid color-mix(in srgb,var(--accent) 22%,transparent);display:flex;flex-direction:column;gap:10px;}
.btn-group{display:flex;flex-direction:column;gap:9px;}
.action-btn{background:linear-gradient(135deg,var(--card-bg) 0%,rgba(0,0,0,0.2) 100%);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--font-body);font-size:17px;padding:13px 20px;cursor:pointer;text-align:left;transition:all 0.22s;line-height:1.5;}
.action-btn:hover{background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 18%,transparent),color-mix(in srgb,var(--accent) 10%,transparent));border-color:var(--accent2);color:var(--accent-glow);transform:translateX(5px);box-shadow:-4px 0 12px color-mix(in srgb,var(--accent) 18%,transparent);}
.dice-btn{background:linear-gradient(135deg,color-mix(in srgb,var(--accent) 22%,transparent),color-mix(in srgb,var(--accent) 12%,transparent));border:1px solid color-mix(in srgb,var(--accent) 55%,transparent);border-radius:7px;color:var(--accent-glow);font-family:var(--font-title);font-size:15px;padding:15px 20px;cursor:pointer;text-align:center;transition:all 0.22s;letter-spacing:0.04em;}
.dice-btn:hover{box-shadow:0 0 22px color-mix(in srgb,var(--accent) 40%,transparent);transform:scale(1.01);}
.typing-indicator{display:none;padding:14px 20px;color:color-mix(in srgb,var(--accent) 65%,transparent);font-style:italic;font-size:16px;}
.typing-indicator.visible{display:block;}
.dot{display:inline-block;animation:blink 1.3s infinite;}
.dot:nth-child(2){animation-delay:0.3s;}
.dot:nth-child(3){animation-delay:0.6s;}
@keyframes blink{0%,80%,100%{opacity:0.15;}40%{opacity:1;}}
#save-indicator{font-size:12px;color:var(--text-dim);opacity:0;transition:opacity 0.4s;font-style:italic;text-align:right;padding:4px 0 0;}
#save-indicator.visible{opacity:0.5;}

/* ── ЗАГРУЗКА ── */
#auth-loading{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:var(--bg);transition:opacity 0.5s;}
#auth-loading.hidden{opacity:0;pointer-events:none;}
.loading-emblem{font-size:56px;animation:breathe 2s ease-in-out infinite;}
@keyframes breathe{0%,100%{filter:drop-shadow(0 0 12px var(--glow1));transform:scale(1);}50%{filter:drop-shadow(0 0 38px var(--accent-glow));transform:scale(1.05);}}
</style>
</head>
<body>

<div id="auth-loading"><div class="loading-emblem">🌐</div></div>

<div id="player-bar">
  <div class="player-name" id="player-name-label">Странник</div>
  <div class="bar-btns">
    <button class="bar-btn" onclick="goToMenu()">← Меню</button>
    <button class="bar-btn" id="btn-logout">Выйти</button>
  </div>
</div>

<div class="container">
  <header>
    <h1 id="game-title">Врата Миров</h1>
    <p id="game-subtitle">Твоё приключение</p>
  </header>
  <div id="story-log"></div>
  <div class="typing-indicator" id="typing">
    Рассказчик думает<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
  </div>
  <div id="action-zone"></div>
  <div id="save-indicator">📜 Сохранено</div>
</div>

<script type="module">
import { initializeApp }     from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
import firebaseConfig from "./firebase-config.js";

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

const state = {
  history: [], diceNotation: null, diceReason: null,
  waitingForDice: false, currentActions: [], locked: false,
  uid: null, gameId: 'session_' + Date.now(),
  worldPrompt: null, thinkingText: 'Рассказчик думает',
};

// ══ AUTH ══
onAuthStateChanged(auth, user => {
  const loading = document.getElementById('auth-loading');
  if (!user) { window.location.href = 'index.html'; return; }

  state.uid = user.uid;
  const name = user.displayName || (user.isAnonymous ? 'Безымянный странник' : user.email?.split('@')[0] || 'Странник');
  document.getElementById('player-name-label').innerHTML = `<span>${name}</span>`;
  document.getElementById('player-bar').classList.add('visible');

  // Читаем данные из sessionStorage
  const newGameData  = sessionStorage.getItem('dnd_newgame');
  const continueData = sessionStorage.getItem('dnd_continue');

  if (newGameData) {
    sessionStorage.removeItem('dnd_newgame');
    const d = JSON.parse(newGameData);
    setupWorld(d);
    askDM(d.startMsg);
  } else if (continueData) {
    sessionStorage.removeItem('dnd_continue');
    const d = JSON.parse(continueData);
    setupWorld(d);
    state.history = d.history || [];
    state.gameId  = d.gameId  || state.gameId;
    restoreHistory(state.history);
  } else {
    // Нет данных — отправляем в меню
    window.location.href = 'menu.html';
    return;
  }

  loading.classList.add('hidden');
  setTimeout(() => loading.remove(), 500);
});

function setupWorld(d) {
  // Применяем тему
  if (d.worldTheme) {
    document.body.classList.add('theme-' + d.worldTheme);
  }
  document.getElementById('game-title').textContent    = d.worldTitle    || 'Врата Миров';
  document.getElementById('game-subtitle').textContent = d.worldSubtitle || 'Твоё приключение';
  if (d.thinkingText) {
    state.thinkingText = d.thinkingText;
    document.getElementById('typing').innerHTML =
      `${d.thinkingText}<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>`;
  }
  if (d.worldPrompt) state.worldPrompt = d.worldPrompt;
}

// ══ НАВИГАЦИЯ ══
document.getElementById('btn-logout').addEventListener('click', async () => {
  await signOut(auth); window.location.href = 'index.html';
});
window.goToMenu = () => { window.location.href = 'menu.html'; };

// ══ АВТОСОХРАНЕНИЕ ══
async function saveProgress() {
  if (!state.uid || state.history.length === 0) return;
  try {
    const titleEl = document.getElementById('game-title');
    await setDoc(doc(db, 'players', state.uid, 'games', state.gameId), {
      gameId:        state.gameId,
      title:         titleEl.textContent + ' · ' + new Date().toLocaleDateString('ru'),
      history:       state.history,
      worldTheme:    document.body.className.match(/theme-(\S+)/)?.[1] || null,
      worldTitle:    titleEl.textContent,
      worldSubtitle: document.getElementById('game-subtitle').textContent,
      thinkingText:  state.thinkingText,
      savedAt:       serverTimestamp(),
    });
    const el = document.getElementById('save-indicator');
    el.classList.add('visible');
    setTimeout(() => el.classList.remove('visible'), 2500);
  } catch(e) { console.warn('Autosave failed:', e); }
}

// ══ ПРОМПТ ══
function buildSystemPrompt() {
  const base = state.worldPrompt || 'Ты — рассказчик, ведущий приключение.';
  return `${base}

СТИЛЬ ПОВЕСТВОВАНИЯ — читать должно быть легко и интересно:
- Короткие абзацы по 2-3 предложения. После каждого абзаца — пустая строка.
- Никогда не пересказывай выбор игрока. Сразу — последствия и ощущения.
- Пиши от второго лица: "ты видишь", "под ногами хрустит".
- Живые диалоги с характером — персонажи говорят своим голосом.
- Используй 1-2 эмодзи в тексте где уместно — для атмосферы.
- Детали: запахи, звуки, свет, фактуры.

ВАРИАНТЫ ДЕЙСТВИЙ:
- Количество: от 1 до 5 — столько сколько реально подходит.
- Коротко, от первого лица: "Спросить о работе", "Уйти молча".
- Разные по духу: смелый / осторожный / хитрый / неожиданный.
- Каждый вариант начинай с подходящего эмодзи по смыслу действия.

ПРАВИЛА ИГРЫ:
1. ВСЕГДА заканчивай блоком выбора или броском кубика.
2. Мир реагирует на выборы — последствия ощутимы.

ФОРМАТ — строго валидный JSON, без текста снаружи:
{"story":"текст с\\nпереносами","type":"choice","actions":["⚔️ Атаковать","💬 Поговорить"]}
или:
{"story":"текст","type":"dice","dice":{"notation":"1d20","reason":"Название"}}
ТОЛЬКО JSON.`;
}

// ══ ИГРОВОЙ ДВИЖОК ══
const log        = document.getElementById('story-log');
const actionZone = document.getElementById('action-zone');
const typing     = document.getElementById('typing');

function scrollBottom() { setTimeout(() => log.scrollTop = log.scrollHeight, 60); }
function showTyping(v)  { typing.classList.toggle('visible', v); }

function addDMMessage(text) {
  const d = document.createElement('div');
  d.className = 'message dm-block';
  d.innerHTML = `<div class="dm-text">${text}</div>`;
  log.appendChild(d); scrollBottom();
}
function addPlayerMessage(text) {
  const d = document.createElement('div');
  d.className = 'message player-block';
  d.innerHTML = `<div class="player-text">↳ ${text}</div>`;
  log.appendChild(d); scrollBottom();
}
function addDiceResult(notation, result, reason) {
  const d = document.createElement('div');
  d.className = 'message dice-result';
  d.innerHTML = `🎲 ${reason}<br><span class="roll-number">${result}</span><small style="opacity:0.65">${notation}</small>`;
  log.appendChild(d); scrollBottom();
}
function setActionZone(html) { actionZone.innerHTML = html; scrollBottom(); }

function rollDice(notation) {
  const m = notation.match(/^(\d+)d(\d+)([+-]\d+)?$/i);
  if (!m) return Math.floor(Math.random() * 20) + 1;
  const n=+m[1],s=+m[2],mod=m[3]?+m[3]:0;
  let t=0; for(let i=0;i<n;i++) t+=Math.floor(Math.random()*s)+1;
  return t+mod;
}

async function askDM(userMessage) {
  if (state.locked) return;
  state.locked = true;
  if (userMessage) state.history.push({ role:'user', content:userMessage });
  showTyping(true); setActionZone('');

  try {
    const resp = await fetch('https://dnd-proxy.vercel.app/api/proxy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 1000,
        system: buildSystemPrompt(),
        messages: state.history
      })
    });
    const data = await resp.json();
    const raw  = data.content?.[0]?.text || '{}';
    let parsed;
    try {
      const clean = raw.replace(/```json?\s*/gi,'').replace(/```\s*/g,'').trim();
      parsed = JSON.parse(clean);
    } catch { parsed = { story: raw, type:'choice', actions:['Продолжить...'] }; }

    state.history.push({ role:'assistant', content:raw });
    showTyping(false);
    addDMMessage(parsed.story || '...');
    renderActions(parsed);
    saveProgress();
  } catch(err) {
    showTyping(false);
    addDMMessage('⚠ Связь прервана. Попробуй ещё раз.');
    setActionZone(`<button class="action-btn" onclick="window._retry()">🔄 Попробовать снова</button>`);
  }
  state.locked = false;
}

function renderActions(parsed) {
  const { type, actions, dice } = parsed;
  let html = '<div class="btn-group">';
  if (type === 'dice') {
    state.waitingForDice = true;
    state.diceNotation = dice?.notation || '1d20';
    state.diceReason   = dice?.reason   || 'Бросок';
    html += `<button class="dice-btn" onclick="window._roll()">🎲 Бросить кубик — ${state.diceReason} (${state.diceNotation})</button>`;
  } else if (actions?.length) {
    state.currentActions = actions;
    actions.forEach((a,i) => {
      html += `<button class="action-btn" onclick="window._choice(${i})">${a}</button>`;
    });
  }
  html += '</div>'; setActionZone(html);
}

window._choice = i => {
  const a = state.currentActions?.[i];
  if (!a || state.locked) return;
  addPlayerMessage(a); askDM(`Я выбираю: ${a}`);
};
window._roll = () => {
  if (!state.waitingForDice || state.locked) return;
  const n=state.diceNotation, r=state.diceReason, result=rollDice(n);
  state.waitingForDice = false;
  addDiceResult(n, result, r);
  askDM(`Я бросил ${n} для "${r}" и выпало: ${result}`);
};
window._retry = () => {
  if (state.history.length && state.history[state.history.length-1].role==='assistant') state.history.pop();
  askDM(null);
};

function restoreHistory(history) {
  for (const msg of history) {
    if (msg.role==='user' && !msg.content.startsWith('Начни новое')) {
      addPlayerMessage(msg.content.replace('Я выбираю: ',''));
    } else if (msg.role==='assistant') {
      try {
        const p = JSON.parse(msg.content.replace(/```json?\s*/gi,'').replace(/```\s*/g,'').trim());
        if (p.story) addDMMessage(p.story);
      } catch { if (msg.content && msg.content!=='{}') addDMMessage(msg.content); }
    }
  }
  askDM('Продолжай приключение с того места где мы остановились. Напомни коротко где я нахожусь и что происходит, затем дай варианты действий.');
}
